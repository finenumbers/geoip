# Portainer production stack — single file, NO `build:` (pulls GHCR images).
#
# Portainer → Stacks → Repository → Compose path:
#   docker-compose.portainer.yml
#
# Do NOT use docker-compose.yml or infra/portainer/stack.compose.yml in Portainer —
# they contain `build:` and Portainer ignores COMPOSE_FILE during build.

services:
  postgres:
    image: postgres:16-alpine
    container_name: geoip_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geoip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoip}
      POSTGRES_DB: ${POSTGRES_DB:-geoip}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geoip} -d ${POSTGRES_DB:-geoip}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: geoip_pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ghcr.io/finenumbers/geoip-api:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@pgbouncer:6432/${POSTGRES_DB:-geoip}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      CONFIG_DATA_DIR: /data/geoip/config
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:-}
      NODE_ENV: production
    volumes:
      - export_data:/tmp/geoip-exports
      - config_data:/data/geoip/config
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/scripts/api-docker-healthcheck.mjs"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M

  import:
    image: ghcr.io/finenumbers/geoip-api:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_import
    command: ["node", "dist/jobs/import-worker.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@pgbouncer:6432/${POSTGRES_DB:-geoip}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      CONFIG_DATA_DIR: /data/geoip/config
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:-}
      NODE_ENV: production
    depends_on:
      pgbouncer:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - import_data:/tmp/geoip-import
      - config_data:/data/geoip/config
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 1G

  export:
    image: ghcr.io/finenumbers/geoip-api:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_export
    command: ["node", "dist/jobs/export-worker.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@pgbouncer:6432/${POSTGRES_DB:-geoip}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      CONFIG_DATA_DIR: /data/geoip/config
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:-}
      NODE_ENV: production
    depends_on:
      pgbouncer:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - export_data:/tmp/geoip-exports
      - config_data:/data/geoip/config
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M

  web:
    image: ghcr.io/finenumbers/geoip-web:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_web
    environment:
      CONFIG_DATA_DIR: /data/geoip/config
    volumes:
      - config_data:/data/geoip/config:ro
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres-backup:
    image: postgres:16-alpine
    container_name: geoip_postgres_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - pg_backups:/backups
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    command:
      - sh
      - -c
      - |
        apk add --no-cache bash >/dev/null
        while true; do
          bash /usr/local/bin/backup-postgres.sh
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done

volumes:
  pg_data:
  import_data:
  export_data:
  config_data:
  pg_backups:
