# Portainer production stack — self-contained, no host bind mounts.
#
# Portainer → Stacks → Repository → Compose path:
#   docker-compose.portainer.yml
#
# Uses Docker configs (inline content) instead of ./infra/ and ./scripts/ bind mounts,
# because Portainer often deploys only the compose file without the full git tree.

configs:
  pgbouncer_ini:
    content: |
      [databases]
      geoip = host=postgres port=5432 dbname=${POSTGRES_DB:-geoip}

      [pgbouncer]
      listen_addr = 0.0.0.0
      listen_port = 6432
      auth_type = plain
      auth_file = /etc/pgbouncer/userlist.txt
      pool_mode = transaction
      max_client_conn = 100
      default_pool_size = 15
      min_pool_size = 2
      reserve_pool_size = 5
      server_reset_query = DISCARD ALL; SET statement_timeout = 30000
      ignore_startup_parameters = extra_float_digits

  pgbouncer_userlist:
    content: "\"${POSTGRES_USER:-geoip}\" \"${POSTGRES_PASSWORD:-geoip}\"\n"

services:
  postgres:
    image: postgres:16-alpine
    container_name: geoip_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geoip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoip}
      POSTGRES_DB: ${POSTGRES_DB:-geoip}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geoip} -d ${POSTGRES_DB:-geoip}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: geoip_pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
    configs:
      - source: pgbouncer_ini
        target: /etc/pgbouncer/pgbouncer.ini
      - source: pgbouncer_userlist
        target: /etc/pgbouncer/userlist.txt
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: ghcr.io/finenumbers/geoip-api:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@pgbouncer:6432/${POSTGRES_DB:-geoip}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      CONFIG_DATA_DIR: /data/geoip/config
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:-}
      NODE_ENV: production
    volumes:
      - export_data:/tmp/geoip-exports
      - config_data:/data/geoip/config
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/scripts/api-docker-healthcheck.mjs"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M

  import:
    image: ghcr.io/finenumbers/geoip-api:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_import
    command: ["node", "dist/jobs/import-worker.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@pgbouncer:6432/${POSTGRES_DB:-geoip}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      CONFIG_DATA_DIR: /data/geoip/config
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:-}
      NODE_ENV: production
    depends_on:
      pgbouncer:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - import_data:/tmp/geoip-import
      - config_data:/data/geoip/config
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 1G

  export:
    image: ghcr.io/finenumbers/geoip-api:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_export
    command: ["node", "dist/jobs/export-worker.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@pgbouncer:6432/${POSTGRES_DB:-geoip}
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      CONFIG_DATA_DIR: /data/geoip/config
      CONFIG_MASTER_KEY: ${CONFIG_MASTER_KEY:-}
      NODE_ENV: production
    depends_on:
      pgbouncer:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - export_data:/tmp/geoip-exports
      - config_data:/data/geoip/config
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M

  web:
    image: ghcr.io/finenumbers/geoip-web:${GEOIP_IMAGE_TAG:-latest}
    container_name: geoip_web
    environment:
      CONFIG_DATA_DIR: /data/geoip/config
    volumes:
      - config_data:/data/geoip/config:ro
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres-backup:
    image: postgres:16-alpine
    container_name: geoip_postgres_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - pg_backups:/backups
    command:
      - sh
      - -c
      - |
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S)
          echo "[backup] writing geoip_$${ts}.sql.gz"
          pg_dump "$$DATABASE_URL" --no-owner --no-acl | gzip > "$$BACKUP_DIR/geoip_$${ts}.sql.gz"
          find "$$BACKUP_DIR" -name 'geoip_*.sql.gz' -mtime +"$${BACKUP_RETENTION_DAYS}" -delete 2>/dev/null || true
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done

volumes:
  pg_data:
  import_data:
  export_data:
  config_data:
  pg_backups:
