# Production overlay: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    ports: !reset []

  pgbouncer:
    ports: !reset []

  api:
    ports: !reset []
    environment:
      NODE_ENV: production
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
      ACCESS_LOG_ENABLED: ${ACCESS_LOG_ENABLED:-true}
    healthcheck:
      test: ["CMD", "node", "/app/scripts/api-docker-healthcheck.mjs"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M

  import:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 1G

  export:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M

  web:
    ports: !override
      - "8080:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres-backup:
    image: postgres:16-alpine
    container_name: geoip_postgres_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoip}:${POSTGRES_PASSWORD:-geoip}@postgres:5432/${POSTGRES_DB:-geoip}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - pg_backups:/backups
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    command:
      - sh
      - -c
      - |
        apk add --no-cache bash >/dev/null
        while true; do
          bash /usr/local/bin/backup-postgres.sh
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done

volumes:
  pg_backups:
