# Production overlay: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  postgres:
    ports: !reset []

  pgbouncer:
    ports: !reset []

  api:
    ports: !reset []
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "/app/scripts/api-docker-healthcheck.mjs"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M

  import:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 1G

  export:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          memory: 256M

  rir:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  web:
    ports: !override
      - "8080:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
