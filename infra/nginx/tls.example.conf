# TLS termination example for GeoIP Analytics web (nginx).
# Copy to your deployment, mount certificates, and use with docker-compose.prod.yml.
#
# Usage:
#   1. Place fullchain.pem and privkey.pem in ./infra/nginx/certs/
#   2. Replace tls.example.conf with this config (or include from default.conf)
#   3. docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d web

server {
    listen 443 ssl http2;
    server_name geoip.example.internal;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key ${API_KEY};
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name geoip.example.internal;
    return 301 https://$host$request_uri;
}
